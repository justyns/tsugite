<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tsugite</title>
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/styles.css">
<link rel="stylesheet" href="/static/css/responsive.css">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#303446">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<script type="module" src="/static/js/app.js"></script>
</head>
<body x-data :data-theme="$store.app.theme">

<nav>
  <button class="menu-toggle" @click="$store.app.menuOpen = !$store.app.menuOpen" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <h1>Tsugite</h1>
  <div class="tab-bar">
    <template x-for="tab in $store.app.tabs" :key="tab">
      <button @click="$store.app.view = tab; location.hash = tab; $store.app.menuOpen = false"
              :class="{ active: $store.app.view === tab }"
              x-text="tab[0].toUpperCase() + tab.slice(1)"></button>
    </template>
  </div>
  <span class="spacer"></span>
  <button class="settings-btn" @click="$store.app.showSettings = true">Settings</button>
</nav>

<div class="nav-menu" :class="{ open: $store.app.menuOpen }"
     @click.self="$store.app.menuOpen = false">
  <div class="nav-menu-panel">
    <div class="tab-bar">
      <template x-for="tab in $store.app.tabs" :key="tab">
        <button @click="$store.app.view = tab; location.hash = tab; $store.app.menuOpen = false"
                :class="{ active: $store.app.view === tab }"
                x-text="tab[0].toUpperCase() + tab.slice(1)"></button>
      </template>
    </div>
    <button class="settings-btn" @click="$store.app.showSettings = true; $store.app.menuOpen = false">Settings</button>
  </div>
</div>

<main>
  <!-- Dashboard -->
  <div class="view" x-show="$store.app.view === 'dashboard'" x-data="dashboardView" x-cloak>
    <div class="view-scroll">
      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading...</div>
      </template>
      <template x-if="error">
        <div class="msg error" x-text="error" style="margin:16px auto"></div>
      </template>
      <template x-if="!loading && !error">
        <div>
          <div class="section-header"><h2>Agents</h2></div>
          <div class="card-grid">
            <template x-for="card in agentCards" :key="card.name">
              <div class="card">
                <h3>
                  <span x-text="card.name"></span>
                  <template x-if="card.running_tasks > 0">
                    <span class="badge badge-accent" style="margin-left:8px;font-size:11px"><span class="spinner" style="width:10px;height:10px;margin-right:4px"></span> running</span>
                  </template>
                </h3>
                <div class="card-meta">
                  <div>Model: <span x-text="card.model || 'unknown'"></span></div>
                  <div>Context: <span x-text="contextDisplay(card)"></span></div>
                  <div>Messages: <span x-text="card.message_count || 0"></span></div>
                </div>
              </div>
            </template>
          </div>
          <template x-if="upcomingSchedules.length > 0">
            <div style="margin-top:24px">
              <div class="section-header"><h2>Upcoming Schedules</h2></div>
              <table class="data-table">
                <thead><tr><th>ID</th><th>Agent</th><th>Next Run</th></tr></thead>
                <tbody>
                  <template x-for="s in upcomingSchedules" :key="s.id">
                    <tr>
                      <td x-text="s.id"></td>
                      <td x-text="s.agent"></td>
                      <td x-text="formatDate(s.next_run)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Conversations -->
  <div class="view" x-show="$store.app.view === 'conversations'" x-data="conversationsView" x-cloak
       @dragover.prevent @dragenter.prevent="onDragEnter($event)"
       @dragleave="onDragLeave($event)" @drop.prevent="onDrop($event)"
       style="position:relative">
    <div class="view-scroll two-pane" style="height:100%; overflow:hidden">
      <!-- Session sidebar -->
      <div class="pane-sidebar" :class="{ 'sidebar-open': sidebarOpen, 'mobile-hidden': selectedSessionId }">
        <div class="section-header"><h2>Sessions</h2></div>
        <template x-if="loading">
          <div class="empty-state"><span class="spinner"></span></div>
        </template>
        <input type="text" x-model="sessionFilter" placeholder="Filter sessions..." class="session-filter"
               x-show="!loading && allSessions.length > 0">
        <div class="turn-list">
          <!-- Interactive sessions (always show header with + button) -->
          <template x-if="!loading">
            <div>
              <div class="session-group-header" style="display:flex;align-items:center;justify-content:space-between">
                <span>Interactive</span>
                <button class="btn-sm" @click="newSession()" title="New conversation" style="padding:2px 8px;font-size:12px">+</button>
              </div>
              <template x-for="s in groupedSessions.interactive" :key="s.conversation_id || s.id">
                <div class="turn-item" :class="{ active: selectedSessionId === (s.conversation_id || s.id) }"
                     @click="selectSession(s)">
                  <div class="item-row">
                    <span class="status-dot" :style="{ background: statusDotColor(s.state) }"></span>
                    <template x-if="s.is_default">
                      <span style="font-size:9px;color:var(--accent);flex-shrink:0" title="Default session">&#9679;</span>
                    </template>
                    <template x-if="editingSessionId === s.id && !s.is_default">
                      <input class="session-title-input" type="text" x-model="editingTitle"
                             @blur="saveTitle(s)" @keydown.enter="saveTitle(s)" @keydown.escape="editingSessionId = null"
                             @click.stop>
                    </template>
                    <template x-if="editingSessionId !== s.id || s.is_default">
                      <span class="session-label-row">
                        <span x-text="sessionLabel(s)" class="session-label"></span>
                        <template x-if="!s.is_default">
                          <span class="session-edit-btn" @click="startEditTitle(s, $event)" title="Rename">&#9998;</span>
                        </template>
                      </span>
                    </template>
                  </div>
                  <div class="turn-meta" x-text="formatDate(s.last_active || s.created_at)"></div>
                </div>
              </template>
            </div>
          </template>

          <!-- Scheduled sessions -->
          <template x-if="groupedSessions.scheduled.length > 0 || groupedSessions.scheduledHidden > 0">
            <details>
              <summary class="session-group-header">
                Scheduled
                <span class="badge badge-muted" style="font-size:10px;margin-left:4px"
                      x-text="groupedSessions.scheduledTotal"></span>
              </summary>
              <template x-for="s in groupedSessions.scheduled" :key="s.conversation_id || s.id">
                <div class="turn-item" :class="{ active: selectedSessionId === (s.conversation_id || s.id) }"
                     @click="selectSession(s)">
                  <div class="item-row">
                    <span class="status-dot" :style="{ background: statusDotColor(s.state) }"></span>
                    <template x-if="editingSessionId === s.id">
                      <input class="session-title-input" type="text" x-model="editingTitle"
                             @blur="saveTitle(s)" @keydown.enter="saveTitle(s)" @keydown.escape="editingSessionId = null"
                             @click.stop>
                    </template>
                    <template x-if="editingSessionId !== s.id">
                      <span class="session-label-row">
                        <span x-text="sessionLabel(s)" class="session-label"></span>
                        <span class="session-edit-btn" @click="startEditTitle(s, $event)" title="Rename">&#9998;</span>
                      </span>
                    </template>
                  </div>
                  <div class="turn-meta" x-text="formatDate(s.last_active || s.created_at)"></div>
                </div>
              </template>
              <template x-if="groupedSessions.scheduledHidden > 0">
                <div class="turn-item" style="opacity:0.6;font-style:italic;cursor:pointer"
                     @click="showCompletedScheduled = !showCompletedScheduled">
                  <span x-text="showCompletedScheduled ? 'Hide completed' : groupedSessions.scheduledHidden + ' completed (click to show)'"></span>
                </div>
              </template>
            </details>
          </template>

          <!-- Background sessions -->
          <template x-if="groupedSessions.background.length > 0">
            <details>
              <summary class="session-group-header">
                Background
                <span class="badge badge-muted" style="font-size:10px;margin-left:4px"
                      x-text="groupedSessions.background.length"></span>
              </summary>
              <template x-for="s in groupedSessions.background" :key="s.conversation_id || s.id">
                <div class="turn-item" :class="{ active: selectedSessionId === (s.conversation_id || s.id) }"
                     @click="selectSession(s)">
                  <div class="item-row">
                    <span class="status-dot" :style="{ background: statusDotColor(s.state) }"></span>
                    <template x-if="editingSessionId === s.id">
                      <input class="session-title-input" type="text" x-model="editingTitle"
                             @blur="saveTitle(s)" @keydown.enter="saveTitle(s)" @keydown.escape="editingSessionId = null"
                             @click.stop>
                    </template>
                    <template x-if="editingSessionId !== s.id">
                      <span class="session-label-row">
                        <span x-text="sessionLabel(s)" class="session-label"></span>
                        <span class="session-edit-btn" @click="startEditTitle(s, $event)" title="Rename">&#9998;</span>
                      </span>
                    </template>
                  </div>
                  <div class="turn-meta" x-text="formatDate(s.last_active || s.created_at)"></div>
                </div>
              </template>
            </details>
          </template>
        </div>
      </div>

      <!-- Main panel -->
      <div class="pane-detail" :class="{ 'mobile-hidden': !selectedSessionId }" style="display:flex;flex-direction:column;min-height:0">
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
          <span class="sidebar-toggle-arrow" :class="{ open: sidebarOpen }">▾</span>
          <span x-text="sidebarOpen ? 'Hide Sessions' : 'Sessions'"></span>
        </button>
        <button class="mobile-back-btn" @click="backToSessions()">&#8592; Sessions</button>
        <template x-if="!selectedSessionId">
          <div class="empty-state">
            <div>Select a session or</div>
            <button class="btn-sm" @click="newSession()" style="margin-top:8px">Start new conversation</button>
          </div>
        </template>

        <!-- Active interactive session: full chat UI -->
        <template x-if="selectedSessionId && isActiveSession">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div id="messages" x-ref="messages">
              <template x-if="compactionSummary">
                <div class="compaction-banner">
                  <div class="compaction-banner-header">
                    <strong>Previous conversation summary</strong>
                    <span>
                      <template x-if="compactionReason"><span class="badge badge-muted" x-text="compactionReason"></span></template>
                      <template x-if="compactedFrom">
                        <a href="#" @click.prevent="selectSession({conversation_id: compactedFrom})" class="compaction-banner-link">view previous session</a>
                      </template>
                    </span>
                  </div>
                  <div class="msg agent compaction-body" x-html="renderHtml(compactionSummary)"></div>
                </div>
              </template>
              <template x-for="(msg, i) in messages" :key="i">
                <div>
                  <template x-if="msg.type === 'compaction'">
                    <div class="history-sep">
                      <template x-if="msg.summary">
                        <details>
                          <summary>session compacted <template x-if="msg.reason"><span class="badge badge-muted" x-text="msg.reason"></span></template></summary>
                          <div class="msg agent compaction-body" x-html="renderHtml(msg.summary)"></div>
                        </details>
                      </template>
                      <template x-if="!msg.summary">
                        <span>session compacted <template x-if="msg.reason"><span class="badge badge-muted" x-text="msg.reason"></span></template></span>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'separator'">
                    <div class="history-sep">
                      <template x-if="hasMoreHistory && i === 0">
                        <button class="btn-sm" @click="loadMoreHistory()" x-text="msg.text"></button>
                      </template>
                      <template x-if="!(hasMoreHistory && i === 0)">
                        <span x-text="msg.text"></span>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'user'">
                    <div class="msg user">
                      <div x-html="renderHtml(msg.text)"></div>
                      <template x-if="msg.reactions && msg.reactions.length">
                        <div class="msg-reactions">
                          <template x-for="(emoji, ri) in msg.reactions" :key="ri">
                            <span class="reaction-badge" x-text="emoji"></span>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'agent'">
                    <div class="msg agent">
                      <div x-html="renderHtml(msg.text)"></div>
                    </div>
                  </template>
                  <template x-if="msg.type === 'error'">
                    <div class="msg error" x-text="msg.text"></div>
                  </template>
                  <template x-if="msg.type === 'info'">
                    <div class="msg info"><span class="info-label">Progress: </span><span x-text="msg.text"></span></div>
                  </template>
                  <template x-if="msg.type === 'progress'">
                    <div class="msg progress">
                      <span class="spinner"></span>
                      <span x-text="msg.statusText"></span>
                      <ul class="tool-steps">
                        <template x-for="(step, j) in msg.steps" :key="j">
                          <li>
                            <template x-if="step.hasDetails">
                              <details :open="step.open" @toggle="if(step.open !== $el.open) step.open = $el.open">
                                <summary x-html="step.summary"></summary>
                                <pre><code x-text="step.content"></code></pre>
                              </details>
                            </template>
                            <template x-if="!step.hasDetails">
                              <span x-html="step.html"></span>
                            </template>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                  <template x-if="msg.type === 'progress-done'">
                    <div class="msg progress">
                      <details>
                        <summary class="tool-summary" x-text="progressSummaryText(msg)"></summary>
                        <ul class="tool-steps">
                          <template x-for="(step, j) in msg.steps" :key="j">
                            <li>
                              <template x-if="step.hasDetails">
                                <details :open="step.open" @toggle="if(step.open !== $el.open) step.open = $el.open">
                                  <summary x-html="step.summary"></summary>
                                  <pre><code x-text="step.content"></code></pre>
                                </details>
                              </template>
                              <template x-if="!step.hasDetails">
                                <span x-html="step.html"></span>
                              </template>
                            </li>
                          </template>
                        </ul>
                      </details>
                      <template x-if="msg.failed">
                        <div class="retry-actions" style="margin-top:8px;display:flex;gap:8px">
                          <button class="btn-sm" @click="retryMessage(msg.lastMessage)">Retry</button>
                          <button class="btn-sm" @click="continueAfterError(msg.lastMessage, msg.errorText)">Continue</button>
                          <template x-if="msg.errorText && msg.errorText.toLowerCase().includes('prompt too long')">
                            <button class="btn-sm" @click="compactSession(msg.lastMessage)">Compact & Retry</button>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'ask_user'">
                    <div class="msg agent ask-user-form">
                      <p><strong x-text="msg.question"></strong></p>
                      <template x-if="msg.answered">
                        <p class="ask-answered">Answered: <em x-text="msg.answer"></em></p>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'yes_no'">
                        <div class="ask-buttons">
                          <button @click="submitAskUser(i, 'yes')">Yes</button>
                          <button @click="submitAskUser(i, 'no')">No</button>
                        </div>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'choice'">
                        <div class="ask-buttons">
                          <template x-for="opt in msg.options" :key="opt">
                            <button @click="submitAskUser(i, opt)" x-text="opt"></button>
                          </template>
                        </div>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'text'">
                        <form class="ask-text" @submit.prevent="submitAskUser(i, msg.inputValue || '')">
                          <input type="text" x-model="msg.inputValue" placeholder="Type your answer..." autofocus>
                          <button type="submit">Send</button>
                        </form>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <div id="status-bar" x-show="statusParts.length > 0">
              <template x-for="(part, i) in statusParts" :key="i">
                <span>
                  <span class="status-label" x-text="part.label + ':'"></span>
                  <template x-if="part.isLink === 'attachments'">
                    <span class="att-link" @click="openAttachments()" x-text="part.value"></span>
                  </template>
                  <template x-if="part.isLink === 'skills'">
                    <span class="att-link" @click="showSkills = true" x-text="part.value"></span>
                  </template>
                  <template x-if="!part.isLink">
                    <span x-text="part.value"></span>
                  </template>
                  <span style="opacity:0.3;margin:0 4px">|</span>
                </span>
              </template>
              <template x-if="compacting">
                <span><span class="spinner"></span> Compacting...</span>
              </template>
              <button class="btn-sm" x-show="!compacting" @click="compactSession()" :disabled="sending">Compact</button>
              <button class="btn-sm" x-show="!compacting && !sending && !selectedSessionMeta?.is_default" @click="completeSession(selectedSessionMeta)">Mark Complete</button>
            </div>

            <div class="drag-overlay" x-show="isDragging" x-cloak>Drop files to attach</div>

            <div class="paste-banner" x-show="showPasteBanner" x-cloak>
              <span>Large paste detected (<span x-text="pendingPasteText.length"></span> chars)</span>
              <div class="paste-banner-actions">
                <button class="btn-sm" @click="acceptPasteAsFile()">Attach as file</button>
                <button class="btn-sm btn-cancel" @click="dismissPasteBanner()">Paste normally</button>
              </div>
            </div>

            <div class="pending-files" x-show="pendingFiles.length > 0">
              <template x-for="(pf, fi) in pendingFiles" :key="fi">
                <div class="pending-file">
                  <template x-if="pf.previewUrl">
                    <img class="file-thumb" :src="pf.previewUrl" :alt="pf.name">
                  </template>
                  <template x-if="!pf.previewUrl">
                    <span class="file-icon">📄</span>
                  </template>
                  <span class="file-name" x-text="pf.name"></span>
                  <button class="file-remove" @click="removeFile(fi)">&times;</button>
                </div>
              </template>
            </div>

            <div id="input-area">
              <div class="command-suggestions" x-show="showCommandSuggestions" x-cloak>
                <template x-for="(cmd, ci) in filteredCommands" :key="cmd.name">
                  <div class="command-suggestion" :class="{ 'selected': ci === commandSelectedIndex }"
                       @click="selectCommand(cmd)" @mouseenter="commandSelectedIndex = ci">
                    <span class="cmd-name" x-text="'/' + cmd.name"></span>
                    <span class="cmd-desc" x-text="cmd.description"></span>
                  </div>
                </template>
              </div>
              <button class="attach-btn" @click="openFilePicker()" title="Attach files">📎</button>
              <button class="attach-btn" @click="openPasteModal()" title="Paste text as attachment">📋</button>
              <input type="file" multiple x-ref="fileInput" @change="onFileInputChange($event)" style="display:none">
              <button class="attach-btn" @click="expandedInput = !expandedInput" :title="expandedInput ? 'Collapse editor' : 'Expand editor'" x-text="expandedInput ? '⤓' : '⤢'"></button>
              <textarea id="message-input" x-model="messageText" rows="1"
                        :class="{ 'input-expanded': expandedInput }"
                        placeholder="Send a message..." autofocus
                        @keydown="onInputKeydown($event)" @input="if (!expandedInput) autoResize($event); onInputChange()"
                        @keydown.escape="expandedInput = false"
                        @paste="onPaste($event)"></textarea>
              <span class="input-hint" x-text="expandedInput ? 'Escape to collapse' : 'Shift+Enter for newline'"></span>
              <button id="send-btn" x-show="!sending" @click="sendMessage()">Send</button>
              <button id="stop-btn" x-show="sending" @click="cancelChat()">Stop</button>
            </div>
          </div>
        </template>

        <!-- Non-interactive session: read-only history -->
        <template x-if="selectedSessionId && !isActiveSession">
          <div style="overflow-y:auto;flex:1">
            <!-- Session metadata header -->
            <template x-if="selectedSessionMeta">
              <div style="margin-bottom:12px">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
                  <span class="badge" :class="stateBadge(selectedSessionMeta.state)" x-text="selectedSessionMeta.state"></span>
                  <span class="badge badge-muted" x-text="selectedSessionMeta.source || 'background'" style="font-weight:normal"></span>
                  <template x-if="selectedSessionMeta.model">
                    <span style="font-size:11px;color:var(--muted)" x-text="selectedSessionMeta.model"></span>
                  </template>
                  <span style="font-size:11px;color:var(--muted)" x-text="formatDate(selectedSessionMeta.created_at)"></span>
                  <div style="display:flex;gap:6px;margin-left:auto">
                    <template x-if="canCancel(selectedSessionMeta)">
                      <button class="btn-sm danger" @click="cancelSession(selectedSessionMeta)">Cancel</button>
                    </template>
                    <template x-if="canComplete(selectedSessionMeta)">
                      <button class="btn-sm" @click="completeSession(selectedSessionMeta)">Mark Complete</button>
                    </template>
                    <template x-if="canRestart(selectedSessionMeta)">
                      <button class="btn-sm" @click="restartSession(selectedSessionMeta)">Restart</button>
                    </template>
                  </div>
                </div>
                <div style="font-size:11px;color:var(--muted);margin-bottom:8px;word-break:break-all" x-text="selectedSessionMeta.id || selectedSessionMeta.conversation_id"></div>
                <template x-if="selectedSessionMeta.prompt">
                  <div class="msg user" x-html="renderHtml(selectedSessionMeta.prompt)"></div>
                </template>
                <template x-if="selectedSessionMeta.error">
                  <div class="msg error" x-text="selectedSessionMeta.error" style="margin-top:8px"></div>
                </template>
                <template x-if="selectedSessionMeta.result && turns.length === 0">
                  <div class="msg agent" x-html="renderHtml(selectedSessionMeta.result)" style="margin-top:8px"></div>
                </template>
              </div>
            </template>

            <!-- Turn history with tool call details -->
            <template x-if="turns.length === 0">
              <div class="empty-state">No turns in this session</div>
            </template>
            <div style="display:flex;flex-direction:column;gap:12px">
              <template x-for="(turn, i) in turns" :key="i">
                <div>
                  <template x-if="turn.type === 'compaction'">
                    <div class="history-sep">
                      <template x-if="turn.summary">
                        <details>
                          <summary>session compacted <template x-if="turn.reason"><span class="badge badge-muted" x-text="turn.reason"></span></template></summary>
                          <div class="msg agent compaction-body" x-html="renderHtml(turn.summary)"></div>
                        </details>
                      </template>
                      <template x-if="!turn.summary"><span>session compacted <template x-if="turn.reason"><span class="badge badge-muted" x-text="turn.reason"></span></template></span></template>
                    </div>
                  </template>
                  <template x-if="turn.type !== 'compaction'">
                    <div>
                      <template x-if="turn.user">
                        <div class="msg user" x-html="renderHtml(turn.user)"></div>
                      </template>
                      <template x-if="extractMessages(turn).length > 0">
                        <div class="tool-calls-section">
                          <details>
                            <summary class="tool-calls-summary">
                              <span x-text="(() => { const calls = extractMessages(turn).filter(m => m.type === 'tool_call'); const n = calls.length; const label = calls.some(m => m.name === 'code') ? 'code execution' : 'tool call'; return n + ' ' + label + (n !== 1 ? 's' : ''); })()"></span>
                            </summary>
                            <template x-for="(m, mi) in extractMessages(turn)" :key="mi">
                              <div class="tool-call-item">
                                <template x-if="m.type === 'tool_call'">
                                  <details>
                                    <summary class="tool-call-name"><span class="badge badge-accent" x-text="m.name === 'code' ? 'Code' : m.name"></span></summary>
                                    <pre class="tool-call-args" x-text="m.args"></pre>

                                </template>
                                <template x-if="m.type === 'tool_result'">

                                    <summary class="tool-result-name">Result<template x-if="m.name"> (<span x-text="m.name"></span>)</template></summary>
                                    <pre class="tool-call-args" x-text="m.content"></pre>
                                  </details>
                                </template>
                              </div>
                            </template>
                          </details>
                        </div>
                      </template>

                <template x-if="row.type === 'run'">

                </template>
                <template x-if="row.type === 'run'">

              </tr>
            </template>
          </tbody>
        </table>
      </template>
    </div>
  </div>


  <!-- Webhooks -->
  <div class="view" x-show="$store.app.view === 'webhooks'" x-data="webhookView" x-cloak>
    <div class="view-scroll">
      <div class="section-header">
        <h2>Webhooks</h2>
        <button class="btn-sm" @click="showForm = !showForm" x-text="showForm ? 'Cancel' : '+ New'"></button>
      </div>

      <template x-if="error">
        <div class="msg error" x-text="error" style="margin-bottom:16px"></div>
      </template>

      <template x-if="showForm">
        <div class="card" style="margin-bottom:16px">
          <div class="form-row">
            <div class="form-group">
              <label>Agent</label>
              <select x-model="form.agent">
                <option value="">Select agent...</option>
                <template x-for="a in $store.app.agents" :key="a.name">
                  <option :value="a.name" x-text="a.name"></option>
                </template>
              </select>
            </div>
            <div class="form-group">
              <label>Source</label>
              <input x-model="form.source" placeholder="github, stripe, etc.">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="showForm = false">Cancel</button>
            <button class="btn-primary" @click="create()">Create</button>
          </div>
        </div>
      </template>

      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading...</div>
      </template>

      <template x-if="!loading && webhooks.length === 0 && !showForm">
        <div class="empty-state">No webhooks configured</div>
      </template>

      <template x-if="!loading && webhooks.length > 0">
        <table class="data-table">
          <thead><tr><th>Source</th><th>Agent</th><th>URL</th><th>Token</th><th>Actions</th></tr></thead>
          <tbody>
            <template x-for="w in webhooks" :key="w.token">
              <tr>
                <td><span class="badge badge-accent" x-text="w.source"></span></td>
                <td x-text="w.agent"></td>
                <td><code style="font-size:12px" x-text="webhookUrl(w.token)"></code></td>
                <td>
                  <span class="token-masked" x-text="isRevealed(w.token) ? w.token : maskedToken(w.token)"></span>
                  <span class="token-reveal" @click="toggleReveal(w.token)" x-text="isRevealed(w.token) ? 'hide' : 'show'"></span>
                </td>
                <td><button class="btn-sm danger" @click="remove(w)">Delete</button></td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>
    </div>
  </div>

  <div class="view" x-show="$store.app.view === 'usage'" x-data="usageView" x-cloak>
    <div class="view-scroll">
      <div class="section-header">
        <h2>Usage & Cost</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <select x-model="sinceDays" @change="load()">
            <option value="7">7 days</option>
            <option value="30">30 days</option>
            <option value="90">90 days</option>
            <option value="365">1 year</option>
          </select>
          <select x-model="period" @change="load()">
            <option value="day">Daily</option>
            <option value="week">Weekly</option>
            <option value="month">Monthly</option>
          </select>
        </div>
      </div>

      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading usage data...</div>
      </template>
      <template x-if="error">
        <div class="msg error" x-text="error" style="margin:16px auto"></div>
      </template>

      <template x-if="!loading && !error && totals">
        <div>
          <div class="card-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
            <div class="card" style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--accent)" x-text="totals.runs"></div>
              <div class="card-meta">Runs</div>
            </div>
            <div class="card" style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--ctp-green)" x-text="fmtTokens(totals.total_tokens)"></div>
              <div class="card-meta">Tokens</div>
            </div>
            <div class="card" style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--ctp-peach)" x-text="fmtCost(totals.total_cost)"></div>
              <div class="card-meta">Cost</div>
            </div>
          </div>

          <template x-if="dailySummary.length > 0">
            <div class="card" style="margin-bottom:20px;overflow:hidden">
              <h3>Cost Trend</h3>
              <div style="display:flex;align-items:flex-end;gap:2px;height:120px;padding-top:12px">
                <template x-for="row in dailySummary" :key="row.period">
                  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0" :title="barLabel(row) + ': ' + fmtCost(row.total_cost) + ' (' + row.runs + ' runs)'">
                    <div style="width:100%;border-radius:3px 3px 0 0;background:var(--accent);min-height:2px;transition:height 0.3s ease" :style="'height:' + barPct(row.total_cost)"></div>
                  </div>
                </template>
              </div>
              <div style="display:flex;gap:2px;margin-top:4px">
                <template x-for="(row, i) in dailySummary" :key="'l'+row.period">
                  <div style="flex:1;text-align:center;font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="i % Math.max(1, Math.floor(dailySummary.length / 8)) === 0 ? barLabel(row) : ''"></div>
                </template>
              </div>
            </div>
          </template>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div class="card">
              <h3>Top Agents</h3>
              <template x-if="topAgents.length === 0"><div class="card-meta">No data</div></template>
              <table class="data-table" x-show="topAgents.length > 0">
                <thead><tr><th>Agent</th><th style="text-align:right">Runs</th><th style="text-align:right">Cost</th></tr></thead>
                <tbody>
                  <template x-for="row in topAgents" :key="row.agent">
                    <tr>
                      <td x-text="row.agent || '(unknown)'"></td>
                      <td style="text-align:right" x-text="row.runs"></td>
                      <td style="text-align:right" x-text="fmtCost(row.total_cost)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="card">
              <h3>Top Models</h3>
              <template x-if="topModels.length === 0"><div class="card-meta">No data</div></template>
              <table class="data-table" x-show="topModels.length > 0">
                <thead><tr><th>Model</th><th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th></tr></thead>
                <tbody>
                  <template x-for="row in topModels" :key="row.model">
                    <tr>
                      <td x-text="row.model || '(unknown)'"></td>
                      <td style="text-align:right" x-text="fmtTokens(row.total_tokens)"></td>
                      <td style="text-align:right" x-text="fmtCost(row.total_cost)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <template x-if="dailySummary.length > 0">
            <div class="card">
              <h3>Detail</h3>
              <table class="data-table">
                <thead><tr><th>Period</th><th style="text-align:right">Runs</th><th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th></tr></thead>
                <tbody>
                  <template x-for="row in [...dailySummary].reverse()" :key="'d'+row.period">
                    <tr>
                      <td x-text="barLabel(row)"></td>
                      <td style="text-align:right" x-text="row.runs"></td>
                      <td style="text-align:right" x-text="fmtTokens(row.total_tokens)"></td>
                      <td style="text-align:right" x-text="fmtCost(row.total_cost)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</main>

<!-- Auth prompt -->
<div class="auth-gate" :class="{ open: $store.app.authRequired }"
     x-data="{ authToken: '', authError: '', checking: false, shake: false }">
  <div class="auth-card">
    <div class="auth-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Tsugite</h2>
    <p class="auth-hint">Paste your API token to connect</p>
    <div class="auth-input-wrap" :class="{ shake: shake }">
      <input type="password" x-model="authToken" placeholder="tsu_..."
             @keydown.enter="$refs.authSubmit.click()"
             @animationend="shake = false"
             autofocus>
    </div>
    <div class="auth-error" x-show="authError" x-text="authError" x-transition.opacity></div>
    <button class="auth-btn" x-ref="authSubmit" :disabled="checking || !authToken.trim()" @click="
      checking = true; authError = '';
      localStorage.setItem('tsugite_token', authToken.trim());
      window.tsugiteLoadAgents().then(() => {
        location.reload();
      }).catch(() => {
        authError = 'Invalid or expired token';
        shake = true;
        localStorage.removeItem('tsugite_token');
        checking = false;
      });
    ">
      <span x-show="!checking">Connect</span>
      <span x-show="checking" class="auth-spinner"></span>
    </button>
    <p class="auth-footer">Generate a token with <code>tsugite daemon token create</code></p>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" :class="{ open: $store.app.showSettings }" @click.self="$store.app.showSettings = false"
     x-data="{ token: '', userId: '', tempTheme: '', tempModel: '', loadedModel: '', pushSubscribed: false, pushLoading: false }"
     x-effect="if ($store.app.showSettings) { token = localStorage.getItem('tsugite_token') || ''; userId = $store.app.userId; tempTheme = $store.app.theme; let agent = $store.app.selectedAgent; if (agent) { window.tsugiteApi.get('/api/agents/' + agent + '/status').then(d => { tempModel = d.model || ''; loadedModel = d.model || ''; }).catch(() => {}); } if ('serviceWorker' in navigator && 'PushManager' in window) { navigator.serviceWorker.ready.then(r => r.pushManager.getSubscription()).then(s => { pushSubscribed = !!s; }).catch(() => {}); } }">
  <div class="modal-content">
    <h2>Settings</h2>
    <label>API Token</label>
    <input type="password" x-model="token" placeholder="tsu_...">
    <label>User ID</label>
    <input type="text" x-model="userId" placeholder="web-user-1">
    <label>Theme</label>
    <select x-model="tempTheme" @change="$store.app.theme = tempTheme">
      <option value="latte">Latte</option>
      <option value="frappe">Frappé</option>
      <option value="macchiato">Macchiato</option>
      <option value="mocha">Mocha</option>
    </select>
    <label>Agent</label>
    <select x-model="$store.app.selectedAgent">
      <template x-for="a in $store.app.agents" :key="a.name">
        <option :value="a.name" x-text="a.name"></option>
      </template>
    </select>
    <label>Model Override</label>
    <input type="text" x-model="tempModel" placeholder="e.g. anthropic:claude-sonnet-4-20250514 (blank = use agent default)">
    <div style="margin-bottom:16px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" :checked="$store.app.autoFollow" @change="$store.app.autoFollow = $el.checked; localStorage.setItem('tsugite_auto_follow', $el.checked)">
        Auto-follow turn details during streaming
      </label>
    </div>
    <template x-if="'serviceWorker' in navigator && 'PushManager' in window">
      <div style="margin-bottom:16px">
        <label>Push Notifications</label>
        <button class="btn-sm" :disabled="pushLoading"
                @click="pushLoading = true; (pushSubscribed ? window.tsugiteUnsubscribePush() : window.tsugiteSubscribePush()).then(() => { pushSubscribed = !pushSubscribed; }).catch(e => console.error('Push toggle failed:', e)).finally(() => { pushLoading = false; })"
                x-text="pushLoading ? 'Working...' : (pushSubscribed ? 'Disable Notifications' : 'Enable Notifications')"></button>
      </div>
    </template>
    <div class="modal-actions">
      <button class="btn-cancel" @click="$store.app.theme = localStorage.getItem('tsugite_theme') || 'frappe'; $store.app.showSettings = false">Cancel</button>
      <button class="btn-primary" @click="
        if (token.trim()) localStorage.setItem('tsugite_token', token.trim()); else localStorage.removeItem('tsugite_token');
        $store.app.userId = userId.trim() || 'web-user-1';
        localStorage.setItem('tsugite_user_id', $store.app.userId);
        localStorage.setItem('tsugite_theme', tempTheme);
        $store.app.theme = tempTheme;
        if (tempModel !== loadedModel) {
          window.tsugiteApi.patch('/api/agents/' + $store.app.selectedAgent + '/config', { model: tempModel || null }).catch(() => {});
        }
        $store.app.showSettings = false;
      ">Save</button>
    </div>
  </div>
</div>

</body>
</html>
