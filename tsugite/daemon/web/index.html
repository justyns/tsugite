<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tsugite</title>
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/styles.css">
<link rel="stylesheet" href="/static/css/responsive.css">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#303446">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<script type="module" src="/static/js/app.js"></script>
</head>
<body x-data :data-theme="$store.app.theme">

<nav>
  <button class="menu-toggle" @click="$store.app.menuOpen = !$store.app.menuOpen" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <h1>Tsugite</h1>
  <div class="tab-bar">
    <template x-for="tab in $store.app.tabs" :key="tab">
      <button @click="$store.app.view = tab; location.hash = tab; $store.app.menuOpen = false"
              :class="{ active: $store.app.view === tab }"
              x-text="tab[0].toUpperCase() + tab.slice(1)"></button>
    </template>
  </div>
  <span class="spacer"></span>
  <button class="settings-btn" @click="$store.app.showSettings = true">Settings</button>
</nav>

<div class="nav-menu" :class="{ open: $store.app.menuOpen }"
     @click.self="$store.app.menuOpen = false">
  <div class="nav-menu-panel">
    <div class="tab-bar">
      <template x-for="tab in $store.app.tabs" :key="tab">
        <button @click="$store.app.view = tab; location.hash = tab; $store.app.menuOpen = false"
                :class="{ active: $store.app.view === tab }"
                x-text="tab[0].toUpperCase() + tab.slice(1)"></button>
      </template>
    </div>
    <button class="settings-btn" @click="$store.app.showSettings = true; $store.app.menuOpen = false">Settings</button>
  </div>
</div>

<main>
  <!-- Dashboard -->
  <div class="view" x-show="$store.app.view === 'dashboard'" x-data="dashboardView" x-cloak>
    <div class="view-scroll">
      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading...</div>
      </template>
      <template x-if="error">
        <div class="msg error" x-text="error" style="margin:16px auto"></div>
      </template>
      <template x-if="!loading && !error">
        <div>
          <div class="section-header"><h2>Agents</h2></div>
          <div class="card-grid">
            <template x-for="card in agentCards" :key="card.name">
              <div class="card">
                <h3>
                  <span x-text="card.name"></span>
                  <template x-if="card.running_tasks > 0">
                    <span class="badge badge-accent" style="margin-left:8px;font-size:11px"><span class="spinner" style="width:10px;height:10px;margin-right:4px"></span> running</span>
                  </template>
                </h3>
                <div class="card-meta">
                  <div>Model: <span x-text="card.model || 'unknown'"></span></div>
                  <div>Context: <span x-text="contextDisplay(card)"></span></div>
                  <div>Messages: <span x-text="card.message_count || 0"></span></div>
                </div>
              </div>
            </template>
          </div>
          <template x-if="upcomingSchedules.length > 0">
            <div style="margin-top:24px">
              <div class="section-header"><h2>Upcoming Schedules</h2></div>
              <table class="data-table">
                <thead><tr><th>ID</th><th>Agent</th><th>Next Run</th></tr></thead>
                <tbody>
                  <template x-for="s in upcomingSchedules" :key="s.id">
                    <tr>
                      <td x-text="s.id"></td>
                      <td x-text="s.agent"></td>
                      <td x-text="formatDate(s.next_run)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Conversations -->
  <div class="view" x-show="$store.app.view === 'conversations'" x-data="conversationsView" x-cloak
       @dragover.prevent @dragenter.prevent="onDragEnter($event)"
       @dragleave="onDragLeave($event)" @drop.prevent="onDrop($event)"
       style="position:relative">
    <div class="view-scroll two-pane" style="height:100%; overflow:hidden">
      <!-- Session sidebar -->
      <div class="pane-sidebar" :class="{ 'sidebar-open': sidebarOpen }">
        <div class="section-header"><h2>Sessions</h2></div>
        <template x-if="loading">
          <div class="empty-state"><span class="spinner"></span></div>
        </template>
        <template x-if="!loading && allSessions.length === 0">
          <div class="empty-state">No sessions</div>
        </template>
        <div class="turn-list">
          <template x-for="s in sortedSessions" :key="s.conversation_id || s.id">
            <div class="turn-item" :class="{ active: selectedSessionId === (s.conversation_id || s.id) }"
                 @click="selectSession(s)">
              <div style="display:flex;align-items:center;gap:6px">
                <span x-text="sessionLabel(s)" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <span class="badge badge-muted" x-text="s.source || 'background'" style="font-size:10px;flex-shrink:0"></span>
                <span class="badge" :class="stateBadge(s.state)" x-text="s.state" style="font-size:10px;flex-shrink:0"></span>
              </div>
              <div class="turn-meta" x-text="formatDate(s.last_active || s.created_at)"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Main panel -->
      <div class="pane-detail" style="display:flex;flex-direction:column;min-height:0">
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
          <span class="sidebar-toggle-arrow" :class="{ open: sidebarOpen }">▾</span>
          <span x-text="sidebarOpen ? 'Hide Sessions' : 'Sessions'"></span>
        </button>
        <template x-if="!selectedSessionId">
          <div class="empty-state">Select a session</div>
        </template>

        <!-- Active interactive session: full chat UI -->
        <template x-if="selectedSessionId && isActiveSession">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div id="messages" x-ref="messages">
              <template x-if="compactionSummary">
                <div class="compaction-banner">
                  <div class="compaction-banner-header">
                    <strong>Previous conversation summary</strong>
                    <template x-if="compactedFrom">
                      <a href="#" @click.prevent="selectSession({conversation_id: compactedFrom})" class="compaction-banner-link">view previous session</a>
                    </template>
                  </div>
                  <div class="msg agent compaction-body" x-html="renderHtml(compactionSummary)"></div>
                </div>
              </template>
              <template x-for="(msg, i) in messages" :key="i">
                <div>
                  <template x-if="msg.type === 'compaction'">
                    <div class="history-sep">
                      <template x-if="msg.summary">
                        <details>
                          <summary>session compacted</summary>
                          <div class="msg agent compaction-body" x-html="renderHtml(msg.summary)"></div>
                        </details>
                      </template>
                      <template x-if="!msg.summary">
                        <span>session compacted</span>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'hook'">
                    <div class="history-sep">
                      <details>
                        <summary>
                          <span x-text="(msg.name || 'hook') + ' (' + msg.phase + ')'"></span>
                          <span class="hook-exit" :class="msg.exit_code === 0 ? 'hook-ok' : 'hook-err'"
                                x-text="'exit ' + msg.exit_code"></span>
                          <template x-if="msg.duration_ms != null">
                            <span class="hook-duration" x-text="msg.duration_ms + 'ms'"></span>
                          </template>
                        </summary>
                        <div class="msg hook-body">
                          <template x-if="msg.stdout">
                            <pre class="hook-stdout"><code x-text="msg.stdout"></code></pre>
                          </template>
                          <template x-if="msg.stderr">
                            <pre class="hook-stderr"><code x-text="msg.stderr"></code></pre>
                          </template>
                        </div>
                      </details>
                    </div>
                  </template>
                  <template x-if="msg.type === 'separator'">
                    <div class="history-sep">
                      <template x-if="hasMoreHistory && i === 0">
                        <button class="btn-sm" @click="loadMoreHistory()" x-text="msg.text"></button>
                      </template>
                      <template x-if="!(hasMoreHistory && i === 0)">
                        <span x-text="msg.text"></span>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'user'">
                    <div class="msg user" x-html="renderHtml(msg.text)"></div>
                  </template>
                  <template x-if="msg.type === 'agent'">
                    <div class="msg agent">
                      <div x-html="renderHtml(msg.text)"></div>
                    </div>
                  </template>
                  <template x-if="msg.type === 'error'">
                    <div class="msg error" x-text="msg.text"></div>
                  </template>
                  <template x-if="msg.type === 'info'">
                    <div class="msg info"><span class="info-label">Progress: </span><span x-text="msg.text"></span></div>
                  </template>
                  <template x-if="msg.type === 'progress'">
                    <div class="msg progress">
                      <span class="spinner"></span>
                      <span x-text="msg.statusText"></span>
                      <ul class="tool-steps">
                        <template x-for="(step, j) in msg.steps" :key="j">
                          <li x-html="step.html"></li>
                        </template>
                      </ul>
                    </div>
                  </template>
                  <template x-if="msg.type === 'progress-done'">
                    <div class="msg progress">
                      <details>
                        <summary class="tool-summary" x-text="progressSummaryText(msg)"></summary>
                        <ul class="tool-steps">
                          <template x-for="(step, j) in msg.steps" :key="j">
                            <li x-html="step.html"></li>
                          </template>
                        </ul>
                      </details>
                      <template x-if="msg.failed">
                        <div class="retry-actions" style="margin-top:8px;display:flex;gap:8px">
                          <button class="btn-sm" @click="retryMessage(msg.lastMessage)">Retry</button>
                          <button class="btn-sm" @click="continueAfterError(msg.lastMessage, msg.errorText)">Continue</button>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="msg.type === 'ask_user'">
                    <div class="msg agent ask-user-form">
                      <p><strong x-text="msg.question"></strong></p>
                      <template x-if="msg.answered">
                        <p class="ask-answered">Answered: <em x-text="msg.answer"></em></p>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'yes_no'">
                        <div class="ask-buttons">
                          <button @click="submitAskUser(i, 'yes')">Yes</button>
                          <button @click="submitAskUser(i, 'no')">No</button>
                        </div>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'choice'">
                        <div class="ask-buttons">
                          <template x-for="opt in msg.options" :key="opt">
                            <button @click="submitAskUser(i, opt)" x-text="opt"></button>
                          </template>
                        </div>
                      </template>
                      <template x-if="!msg.answered && msg.questionType === 'text'">
                        <form class="ask-text" @submit.prevent="submitAskUser(i, msg.inputValue || '')">
                          <input type="text" x-model="msg.inputValue" placeholder="Type your answer..." autofocus>
                          <button type="submit">Send</button>
                        </form>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <div id="status-bar" x-show="statusParts.length > 0">
              <template x-for="(part, i) in statusParts" :key="i">
                <span>
                  <span class="status-label" x-text="part.label + ':'"></span>
                  <template x-if="part.isLink === 'attachments'">
                    <span class="att-link" @click="openAttachments()" x-text="part.value"></span>
                  </template>
                  <template x-if="part.isLink === 'skills'">
                    <span class="att-link" @click="showSkills = true" x-text="part.value"></span>
                  </template>
                  <template x-if="!part.isLink">
                    <span x-text="part.value"></span>
                  </template>
                  <span style="opacity:0.3;margin:0 4px">|</span>
                </span>
              </template>
              <template x-if="compacting">
                <span><span class="spinner"></span> Compacting...</span>
              </template>
              <button class="btn-sm" x-show="!compacting" @click="compactSession()" :disabled="sending">Compact</button>
            </div>

            <div class="drag-overlay" x-show="isDragging" x-cloak>Drop files to attach</div>

            <div class="pending-files" x-show="pendingFiles.length > 0">
              <template x-for="(pf, fi) in pendingFiles" :key="fi">
                <div class="pending-file">
                  <template x-if="pf.previewUrl">
                    <img class="file-thumb" :src="pf.previewUrl" :alt="pf.name">
                  </template>
                  <template x-if="!pf.previewUrl">
                    <span class="file-icon">📄</span>
                  </template>
                  <span class="file-name" x-text="pf.name"></span>
                  <button class="file-remove" @click="removeFile(fi)">&times;</button>
                </div>
              </template>
            </div>

            <div id="input-area">
              <button class="attach-btn" @click="openFilePicker()" title="Attach files">📎</button>
              <input type="file" multiple x-ref="fileInput" @change="onFileInputChange($event)" style="display:none">
              <textarea id="message-input" x-model="messageText" rows="1"
                        placeholder="Send a message..." autofocus
                        @keydown="onInputKeydown" @input="autoResize"></textarea>
              <span class="input-hint">Shift+Enter for newline</span>
              <button id="send-btn" @click="sendMessage()" :disabled="sending">Send</button>
            </div>
          </div>
        </template>

        <!-- Non-interactive session: read-only history -->
        <template x-if="selectedSessionId && !isActiveSession">
          <div style="overflow-y:auto;flex:1">
            <!-- Session metadata card -->
            <template x-if="selectedSessionMeta">
              <div class="card" style="margin-bottom:12px">
                <h3 style="display:flex;align-items:center;gap:8px">
                  <span x-text="selectedSessionMeta.id || selectedSessionMeta.conversation_id"></span>
                  <span class="badge badge-muted" x-text="selectedSessionMeta.source || 'background'" style="font-weight:normal"></span>
                </h3>
                <div class="card-meta">
                  <div>Status: <span class="badge" :class="stateBadge(selectedSessionMeta.state)" x-text="selectedSessionMeta.state"></span></div>
                  <template x-if="selectedSessionMeta.prompt">
                    <div>Prompt: <span x-text="selectedSessionMeta.prompt" style="font-size:12px"></span></div>
                  </template>
                  <template x-if="selectedSessionMeta.model">
                    <div>Model: <span x-text="selectedSessionMeta.model"></span></div>
                  </template>
                  <template x-if="selectedSessionMeta.error">
                    <div style="color:var(--error)">Error: <span x-text="selectedSessionMeta.error"></span></div>
                  </template>
                  <template x-if="selectedSessionMeta.result">
                    <div>Result: <span x-text="selectedSessionMeta.result" style="font-size:12px"></span></div>
                  </template>
                  <div style="font-size:12px;color:var(--muted);margin-top:4px">
                    Created: <span x-text="formatDate(selectedSessionMeta.created_at)"></span>
                    <template x-if="selectedSessionMeta.last_active">
                      · Last active: <span x-text="formatDate(selectedSessionMeta.last_active)"></span>
                    </template>
                  </div>
                  <div style="display:flex;gap:8px;margin-top:8px">
                    <template x-if="canCancel(selectedSessionMeta)">
                      <button class="btn-sm danger" @click="cancelSession(selectedSessionMeta)">Cancel</button>
                    </template>
                    <template x-if="canRestart(selectedSessionMeta)">
                      <button class="btn-sm" @click="restartSession(selectedSessionMeta)">Restart</button>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- Turn history with tool call details -->
            <template x-if="turns.length === 0">
              <div class="empty-state">No turns in this session</div>
            </template>
            <div style="display:flex;flex-direction:column;gap:12px">
              <template x-for="(turn, i) in turns" :key="i">
                <div>
                  <template x-if="turn.type === 'compaction'">
                    <div class="history-sep">
                      <template x-if="turn.summary">
                        <details>
                          <summary>session compacted</summary>
                          <div class="msg agent compaction-body" x-html="renderHtml(turn.summary)"></div>
                        </details>
                      </template>
                      <template x-if="!turn.summary"><span>session compacted</span></template>
                    </div>
                  </template>
                  <template x-if="turn.type !== 'compaction'">
                    <div>
                      <template x-if="turn.user">
                        <div class="msg user" x-html="renderHtml(turn.user)"></div>
                      </template>
                      <template x-if="extractMessages(turn).length > 0">
                        <div class="tool-calls-section">
                          <details>
                            <summary class="tool-calls-summary">
                              <span x-text="(() => { const calls = extractMessages(turn).filter(m => m.type === 'tool_call'); const n = calls.length; const label = calls.some(m => m.name === 'code') ? 'code execution' : 'tool call'; return n + ' ' + label + (n !== 1 ? 's' : ''); })()"></span>
                            </summary>
                            <template x-for="(m, mi) in extractMessages(turn)" :key="mi">
                              <div class="tool-call-item">
                                <template x-if="m.type === 'tool_call'">
                                  <details>
                                    <summary class="tool-call-name"><span class="badge badge-accent" x-text="m.name === 'code' ? 'Code' : m.name"></span></summary>
                                    <pre class="tool-call-args" x-text="m.args"></pre>
                                  </details>
                                </template>
                                <template x-if="m.type === 'tool_result'">
                                  <details>
                                    <summary class="tool-result-name">Result<template x-if="m.name"> (<span x-text="m.name"></span>)</template></summary>
                                    <pre class="tool-call-args" x-text="m.content"></pre>
                                  </details>
                                </template>
                              </div>
                            </template>
                          </details>
                        </div>
                      </template>
                      <template x-if="turn.assistant">
                        <div class="msg agent" x-html="renderHtml(turn.assistant)"></div>
                      </template>
                      <template x-if="turn.timestamp">
                        <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:2px" x-text="formatDate(turn.timestamp)"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Attachments modal -->
    <div class="modal-backdrop att-modal" :class="{ open: showAttachments }" @click.self="showAttachments = false">
      <div class="modal-content">
        <h2>Attachments</h2>
        <template x-if="attachments.length === 0">
          <p style="color:var(--muted);font-size:13px">No attachments</p>
        </template>
        <template x-for="(att, i) in attachments" :key="i">
          <div class="att-item" x-data="{ open: false }">
            <div class="att-header" @click="open = !open">
              <span class="att-name" x-text="att.name"></span>
              <span class="att-type" x-text="att.content_type + ' · ' + att.mime_type"></span>
            </div>
            <div class="att-body" x-show="open">
              <template x-if="att.content != null">
                <pre x-text="att.content"></pre>
              </template>
              <template x-if="att.content == null">
                <span style="color:var(--muted)" x-text="att.size_bytes != null ? att.size_bytes + ' bytes (binary)' : 'No content preview'"></span>
              </template>
            </div>
          </div>
        </template>
        <div class="modal-actions">
          <button class="btn-cancel" @click="showAttachments = false">Close</button>
        </div>
      </div>
    </div>

    <!-- Skills modal -->
    <div class="modal-backdrop att-modal" :class="{ open: showSkills }" @click.self="showSkills = false">
      <div class="modal-content">
        <h2>Loaded Skills</h2>
        <template x-if="loadedSkills.length === 0">
          <p style="color:var(--muted);font-size:13px">No skills loaded</p>
        </template>
        <template x-for="skill in loadedSkills" :key="skill.name">
          <div class="att-item">
            <div class="att-header">
              <span class="att-name" x-text="skill.name"></span>
              <span class="att-type" x-text="skill.description"></span>
            </div>
          </div>
        </template>
        <div class="modal-actions">
          <button class="btn-cancel" @click="showSkills = false">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Workspace Browser -->
  <div class="view" x-show="$store.app.view === 'workspace'" x-data="workspaceView" x-cloak>
    <div class="view-scroll two-pane" style="height:100%; overflow:hidden">
      <!-- File list -->
      <div class="pane-sidebar" :class="{ 'sidebar-open': sidebarOpen }">
        <div class="section-header">
          <h2>Workspace</h2>
        </div>
        <template x-if="workspaceDir">
          <div style="font-size:11px;color:var(--muted);padding:0 12px 8px;word-break:break-all" x-text="workspaceDir"></div>
        </template>
        <template x-if="loading">
          <div class="empty-state"><span class="spinner"></span></div>
        </template>
        <template x-if="!loading && files.length === 0">
          <div class="empty-state">No files in workspace</div>
        </template>
        <div class="turn-list">
          <template x-for="file in files" :key="file.path">
            <div class="turn-item" :class="{ active: selectedFile?.path === file.path }"
                 @click="selectFile(file)">
              <div style="display:flex;align-items:center;gap:6px">
                <span x-text="file.path" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <template x-if="!file.is_text">
                  <span class="badge" style="font-size:10px;flex-shrink:0">binary</span>
                </template>
              </div>
              <div class="turn-meta" x-text="formatSize(file.size) + ' · ' + formatDate(file.modified)"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Editor / Viewer -->
      <div class="pane-detail" style="display:flex;flex-direction:column">
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
          <span class="sidebar-toggle-arrow" :class="{ open: sidebarOpen }">▾</span>
          <span x-text="sidebarOpen ? 'Hide Files' : 'Files'"></span>
        </button>
        <template x-if="!selectedFile">
          <div class="empty-state">Select a file to view</div>
        </template>
        <template x-if="selectedFile">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div class="section-header">
              <h2>
                <span x-text="selectedFile.name"></span>
                <template x-if="isDirty">
                  <span style="color:var(--accent);font-size:12px;margin-left:8px">unsaved</span>
                </template>
              </h2>
              <div style="display:flex;gap:6px">
                <button class="btn-sm" @click="attachToChat(selectedFile)" title="Attach to conversation">Attach</button>
                <template x-if="selectedFile.is_text">
                  <button class="btn-sm" @click="save()" :disabled="saving || !isDirty"
                          x-text="saving ? 'Saving...' : 'Save'"></button>
                </template>
              </div>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px" x-text="selectedFile.path"></div>
            <template x-if="error">
              <div class="msg error" x-text="error" style="margin-bottom:8px"></div>
            </template>
            <template x-if="!selectedFile.is_text">
              <div class="empty-state">
                <div>Binary file</div>
                <div style="font-size:12px;color:var(--muted);margin-top:4px" x-text="formatSize(selectedFile.size)"></div>
              </div>
            </template>
            <template x-if="selectedFile.is_text">
              <textarea x-model="content"
                        style="flex:1;min-height:300px;font-family:monospace;font-size:13px;resize:vertical;background:var(--surface0);color:var(--text);border:1px solid var(--surface2);border-radius:6px;padding:12px;tab-size:2"></textarea>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Agent Files -->
  <div class="view" x-show="$store.app.view === 'agents'" x-data="agentFileView" x-cloak>
    <div class="view-scroll two-pane" style="height:100%; overflow:hidden">
      <!-- File list -->
      <div class="pane-sidebar" :class="{ 'sidebar-open': sidebarOpen }">
        <div class="section-header">
          <h2>Agent Files</h2>
          <select x-model="filter" style="font-size:12px;padding:2px 4px">
            <option value="all">All</option>
            <option value="project">Project</option>
            <option value="builtin">Builtin</option>
            <option value="global">Global</option>
          </select>
        </div>
        <template x-if="loading">
          <div class="empty-state"><span class="spinner"></span></div>
        </template>
        <template x-if="!loading && filteredFiles.length === 0">
          <div class="empty-state">No agent files found</div>
        </template>
        <div class="turn-list">
          <template x-for="file in filteredFiles" :key="file.path">
            <div class="turn-item" :class="{ active: selectedFile?.path === file.path }"
                 @click="selectFile(file)">
              <div>
                <span x-text="file.name"></span>
                <template x-if="file.readonly">
                  <span class="badge" style="font-size:10px;margin-left:4px">readonly</span>
                </template>
              </div>
              <div class="turn-meta" x-text="file.source + (file.description ? ' · ' + file.description : '')"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Editor -->
      <div class="pane-detail" style="display:flex;flex-direction:column">
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
          <span class="sidebar-toggle-arrow" :class="{ open: sidebarOpen }">▾</span>
          <span x-text="sidebarOpen ? 'Hide Agents' : 'Agents'"></span>
        </button>
        <template x-if="!selectedFile">
          <div class="empty-state">Select an agent file to view</div>
        </template>
        <template x-if="selectedFile">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div class="section-header">
              <h2>
                <span x-text="selectedFile.name"></span>
                <template x-if="isDirty">
                  <span style="color:var(--accent);font-size:12px;margin-left:8px">unsaved</span>
                </template>
              </h2>
              <template x-if="!selectedFile.readonly">
                <button class="btn-sm" @click="save()" :disabled="saving || !isDirty"
                        x-text="saving ? 'Saving...' : 'Save'"></button>
              </template>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px" x-text="selectedFile.path"></div>
            <template x-if="error">
              <div class="msg error" x-text="error" style="margin-bottom:8px"></div>
            </template>
            <textarea x-model="content"
                      :readonly="selectedFile.readonly"
                      style="flex:1;min-height:300px;font-family:monospace;font-size:13px;resize:vertical;background:var(--surface0);color:var(--text);border:1px solid var(--surface2);border-radius:6px;padding:12px;tab-size:2"></textarea>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Skill Files -->
  <div class="view" x-show="$store.app.view === 'skills'" x-data="skillFileView" x-cloak>
    <div class="view-scroll two-pane" style="height:100%; overflow:hidden">
      <!-- File list -->
      <div class="pane-sidebar" :class="{ 'sidebar-open': sidebarOpen }">
        <div class="section-header">
          <h2>Skill Files</h2>
          <select x-model="filter" style="font-size:12px;padding:2px 4px">
            <option value="all">All</option>
            <option value="project">Project</option>
            <option value="builtin">Builtin</option>
            <option value="global">Global</option>
          </select>
        </div>
        <template x-if="loading">
          <div class="empty-state"><span class="spinner"></span></div>
        </template>
        <template x-if="!loading && filteredFiles.length === 0">
          <div class="empty-state">No skill files found</div>
        </template>
        <div class="turn-list">
          <template x-for="file in filteredFiles" :key="file.path">
            <div class="turn-item" :class="{ active: selectedFile?.path === file.path }"
                 @click="selectFile(file)">
              <div>
                <span x-text="file.name"></span>
                <template x-if="file.readonly">
                  <span class="badge" style="font-size:10px;margin-left:4px">readonly</span>
                </template>
              </div>
              <div class="turn-meta" x-text="file.source + (file.description ? ' · ' + file.description : '')"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Editor -->
      <div class="pane-detail" style="display:flex;flex-direction:column">
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
          <span class="sidebar-toggle-arrow" :class="{ open: sidebarOpen }">▾</span>
          <span x-text="sidebarOpen ? 'Hide Skills' : 'Skills'"></span>
        </button>
        <template x-if="!selectedFile">
          <div class="empty-state">Select a skill file to view</div>
        </template>
        <template x-if="selectedFile">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div class="section-header">
              <h2>
                <span x-text="selectedFile.name"></span>
                <template x-if="isDirty">
                  <span style="color:var(--accent);font-size:12px;margin-left:8px">unsaved</span>
                </template>
              </h2>
              <template x-if="!selectedFile.readonly">
                <button class="btn-sm" @click="save()" :disabled="saving || !isDirty"
                        x-text="saving ? 'Saving...' : 'Save'"></button>
              </template>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px" x-text="selectedFile.path"></div>
            <template x-if="error">
              <div class="msg error" x-text="error" style="margin-bottom:8px"></div>
            </template>
            <textarea x-model="content"
                      :readonly="selectedFile.readonly"
                      style="flex:1;min-height:300px;font-family:monospace;font-size:13px;resize:vertical;background:var(--surface0);color:var(--text);border:1px solid var(--surface2);border-radius:6px;padding:12px;tab-size:2"></textarea>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Schedules -->
  <div class="view" x-show="$store.app.view === 'schedules'" x-data="scheduleView" x-cloak>
    <div class="view-scroll">
      <div class="section-header">
        <h2>Schedules</h2>
        <button class="btn-sm" @click="showForm ? cancelForm() : (showForm = true)" x-text="showForm ? 'Cancel' : '+ New'"></button>
      </div>

      <template x-if="error">
        <div class="msg error" x-text="error" style="margin-bottom:16px"></div>
      </template>

      <!-- Create/Edit form -->
      <template x-if="showForm">
        <div class="card" style="margin-bottom:16px">
          <h3 x-text="formTitle" style="margin-bottom:12px"></h3>
          <div class="form-row">
            <div class="form-group">
              <label>ID</label>
              <input x-model="form.id" placeholder="my-schedule" :disabled="!!editingId">
            </div>
            <div class="form-group">
              <label>Agent</label>
              <select x-model="form.agent">
                <option value="">Select agent...</option>
                <template x-for="a in $store.app.agents" :key="a.name">
                  <option :value="a.name" x-text="a.name"></option>
                </template>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Prompt</label>
            <textarea x-model="form.prompt" rows="2" placeholder="Task for the agent..." style="resize:vertical"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Model</label>
              <input x-model="form.model" placeholder="e.g. openai:gpt-4o-mini">
            </div>
            <div class="form-group">
              <label>Agent File</label>
              <input x-model="form.agent_file" placeholder="e.g. my-agent.md">
            </div>
            <div class="form-group">
              <label>Max Turns</label>
              <input x-model="form.max_turns" type="number" min="1" placeholder="default">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Type</label>
              <select x-model="form.schedule_type">
                <option value="cron">Cron</option>
                <option value="once">Once</option>
              </select>
            </div>
            <div class="form-group" x-show="form.schedule_type === 'cron'">
              <label>Cron Expression</label>
              <input x-model="form.cron_expr" placeholder="0 9 * * *">
            </div>
            <div class="form-group" x-show="form.schedule_type === 'once'">
              <label>Run At (ISO)</label>
              <input x-model="form.run_at" type="datetime-local">
            </div>
            <div class="form-group">
              <label>Timezone</label>
              <input x-model="form.timezone" placeholder="UTC">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="cancelForm()">Cancel</button>
            <button class="btn-primary" @click="save()" x-text="editingId ? 'Update' : 'Create'"></button>
          </div>
        </div>
      </template>

      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading...</div>
      </template>

      <template x-if="!loading && schedules.length === 0">
        <div class="empty-state">No schedules configured</div>
      </template>

      <template x-if="!loading && schedules.length > 0">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Agent</th><th>Type</th><th>Status</th><th>Next Run</th><th>Last Run</th><th>Actions</th></tr></thead>
          <tbody>
            <template x-for="row in tableRows" :key="row.key">
              <tr :class="row.type === 'run' ? 'schedule-run-row' : ''">
                <template x-if="row.type === 'schedule'">
                  <td>
                    <span style="cursor:pointer" @click="toggleRuns(row.data)" x-text="(expandedId === row.data.id ? '▾ ' : '▸ ') + row.data.id"></span>
                  </td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td x-text="row.data.agent"></td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td x-text="row.data.schedule_type"></td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td><span class="badge" :class="statusBadge(row.data)" x-text="statusLabel(row.data)"></span></td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td x-text="formatDate(row.data.next_run)"></td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td x-text="formatDate(row.data.last_run)"></td>
                </template>
                <template x-if="row.type === 'schedule'">
                  <td style="white-space:nowrap">
                    <button class="btn-sm" @click="edit(row.data)">Edit</button>
                    <button class="btn-sm" @click="toggle(row.data)" x-text="row.data.enabled ? 'Disable' : 'Enable'"></button>
                    <button class="btn-sm" @click="runNow(row.data)">Run</button>
                    <button class="btn-sm danger" @click="remove(row.data)">Delete</button>
                  </td>
                </template>
                <template x-if="row.type === 'run'">
                  <td colspan="2" style="padding-left:28px;font-size:12px;color:var(--muted)" x-text="row.data.id"></td>
                </template>
                <template x-if="row.type === 'run'">
                  <td></td>
                </template>
                <template x-if="row.type === 'run'">
                  <td><span class="badge" :class="runBadge(row.data.status)" x-text="row.data.status"></span></td>
                </template>
                <template x-if="row.type === 'run'">
                  <td x-text="formatDate(row.data.created_at)" style="font-size:12px"></td>
                </template>
                <template x-if="row.type === 'run'">
                  <td x-text="(row.data.result || row.data.error || '—').substring(0, 80)" style="font-size:12px;color:var(--muted)"></td>
                </template>
                <template x-if="row.type === 'run'">
                  <td><button class="btn-sm" @click="viewRunHistory(row.data)">View</button></td>
                </template>
                <template x-if="row.type === 'empty'">
                  <td colspan="7" style="padding-left:28px;font-size:12px;color:var(--muted)">No recorded runs</td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </template>
    </div>
  </div>


  <!-- Webhooks -->
  <div class="view" x-show="$store.app.view === 'webhooks'" x-data="webhookView" x-cloak>
    <div class="view-scroll">
      <div class="section-header">
        <h2>Webhooks</h2>
        <button class="btn-sm" @click="showForm = !showForm" x-text="showForm ? 'Cancel' : '+ New'"></button>
      </div>

      <template x-if="error">
        <div class="msg error" x-text="error" style="margin-bottom:16px"></div>
      </template>

      <template x-if="showForm">
        <div class="card" style="margin-bottom:16px">
          <div class="form-row">
            <div class="form-group">
              <label>Agent</label>
              <select x-model="form.agent">
                <option value="">Select agent...</option>
                <template x-for="a in $store.app.agents" :key="a.name">
                  <option :value="a.name" x-text="a.name"></option>
                </template>
              </select>
            </div>
            <div class="form-group">
              <label>Source</label>
              <input x-model="form.source" placeholder="github, stripe, etc.">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="showForm = false">Cancel</button>
            <button class="btn-primary" @click="create()">Create</button>
          </div>
        </div>
      </template>

      <template x-if="loading">
        <div class="empty-state"><span class="spinner"></span> Loading...</div>
      </template>

      <template x-if="!loading && webhooks.length === 0 && !showForm">
        <div class="empty-state">No webhooks configured</div>
      </template>

      <template x-if="!loading && webhooks.length > 0">
        <table class="data-table">
          <thead><tr><th>Source</th><th>Agent</th><th>URL</th><th>Token</th><th>Actions</th></tr></thead>
          <tbody>
            <template x-for="w in webhooks" :key="w.token">
              <tr>
                <td><span class="badge badge-accent" x-text="w.source"></span></td>
                <td x-text="w.agent"></td>
                <td><code style="font-size:12px" x-text="webhookUrl(w.token)"></code></td>
                <td>
                  <span class="token-masked" x-text="isRevealed(w.token) ? w.token : maskedToken(w.token)"></span>
                  <span class="token-reveal" @click="toggleReveal(w.token)" x-text="isRevealed(w.token) ? 'hide' : 'show'"></span>
                </td>
                <td><button class="btn-sm danger" @click="remove(w)">Delete</button></td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>
    </div>
  </div>
</main>

<!-- Settings modal -->
<div class="modal-backdrop" :class="{ open: $store.app.showSettings }" @click.self="$store.app.showSettings = false"
     x-data="{ token: '', userId: '', tempTheme: '', tempModel: '', loadedModel: '', pushSubscribed: false, pushLoading: false }"
     x-effect="if ($store.app.showSettings) { token = localStorage.getItem('tsugite_token') || ''; userId = $store.app.userId; tempTheme = $store.app.theme; let agent = $store.app.selectedAgent; if (agent) { window.tsugiteApi.get('/api/agents/' + agent + '/status').then(d => { tempModel = d.model || ''; loadedModel = d.model || ''; }).catch(() => {}); } if ('serviceWorker' in navigator && 'PushManager' in window) { navigator.serviceWorker.ready.then(r => r.pushManager.getSubscription()).then(s => { pushSubscribed = !!s; }).catch(() => {}); } }">
  <div class="modal-content">
    <h2>Settings</h2>
    <label>API Token</label>
    <input type="password" x-model="token" placeholder="Bearer token (leave empty if no auth)">
    <label>User ID</label>
    <input type="text" x-model="userId" placeholder="web-user-1">
    <label>Theme</label>
    <select x-model="tempTheme" @change="$store.app.theme = tempTheme">
      <option value="latte">Latte</option>
      <option value="frappe">Frappé</option>
      <option value="macchiato">Macchiato</option>
      <option value="mocha">Mocha</option>
    </select>
    <label>Agent</label>
    <select x-model="$store.app.selectedAgent">
      <template x-for="a in $store.app.agents" :key="a.name">
        <option :value="a.name" x-text="a.name"></option>
      </template>
    </select>
    <label>Model Override</label>
    <input type="text" x-model="tempModel" placeholder="e.g. anthropic:claude-sonnet-4-20250514 (blank = use agent default)">
    <template x-if="'serviceWorker' in navigator && 'PushManager' in window">
      <div style="margin-bottom:16px">
        <label>Push Notifications</label>
        <button class="btn-sm" :disabled="pushLoading"
                @click="pushLoading = true; (pushSubscribed ? window.tsugiteUnsubscribePush() : window.tsugiteSubscribePush()).then(() => { pushSubscribed = !pushSubscribed; }).catch(e => console.error('Push toggle failed:', e)).finally(() => { pushLoading = false; })"
                x-text="pushLoading ? 'Working...' : (pushSubscribed ? 'Disable Notifications' : 'Enable Notifications')"></button>
      </div>
    </template>
    <div class="modal-actions">
      <button class="btn-cancel" @click="$store.app.theme = localStorage.getItem('tsugite_theme') || 'frappe'; $store.app.showSettings = false">Cancel</button>
      <button class="btn-primary" @click="
        if (token.trim()) localStorage.setItem('tsugite_token', token.trim()); else localStorage.removeItem('tsugite_token');
        $store.app.userId = userId.trim() || 'web-user-1';
        localStorage.setItem('tsugite_user_id', $store.app.userId);
        localStorage.setItem('tsugite_theme', tempTheme);
        $store.app.theme = tempTheme;
        if (tempModel !== loadedModel) {
          window.tsugiteApi.patch('/api/agents/' + $store.app.selectedAgent + '/config', { model: tempModel || null }).catch(() => {});
        }
        $store.app.showSettings = false;
      ">Save</button>
    </div>
  </div>
</div>

</body>
</html>
